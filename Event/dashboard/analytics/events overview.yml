info:
  name: events overview
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/dashboard/analytics/organizer/events "
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{baseUrl}}/dashboard/analytics/organizer/events "
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: access-control-allow-origin
          value: "*"
        - name: access-control-expose-headers
          value: Authorization, RefreshToken
        - name: content-type
          value: application/json; charset=utf-8
        - name: content-length
          value: "107"
        - name: etag
          value: W/"6b-+2HChDp8qp8Cv/7lRSZN17IdwGw"
        - name: date
          value: Tue, 12 May 2026 09:25:30 GMT
        - name: connection
          value: keep-alive
        - name: keep-alive
          value: timeout=5
      body:
        type: json
        data: |-
          {
            "success": true,
            "message": "Event stats retrieved successfully",
            "data": {
              "events": {
                "total": 1,
                "published": 1
              }
            }
          }
