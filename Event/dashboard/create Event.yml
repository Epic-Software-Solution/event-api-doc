    data: |-
      {
        "title": "Addis Music Festival 2025",
        "description": "The biggest music festival in Addis Ababa featuring top local and international artists.",
        "shortDescription": "Addis's premier annual music festival",
        "timezone": "Africa/Addis_Ababa",
