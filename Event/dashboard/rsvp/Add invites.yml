          value: Authorization, RefreshToken
        - name: content-type
          value: application/json; charset=utf-8
        - name: content-length
          value: "86"
        - name: etag
          value: W/"56-l7Aot6TihsmkZfDWV2FjI25Owzw"
        - name: date
          value: Wed, 13 May 2026 12:38:37 GMT
        - name: connection
          value: keep-alive
        - name: keep-alive
