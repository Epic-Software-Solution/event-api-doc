    request:
      url: "{{baseUrl}}/rsvp/forms/6a04703e333630b67f61c826/invites"
      method: POST
      body:
        type: json
        data: |-
          {
            "contacts": [
              { "contact": "abebe@example.com",  "contactType": "email" },
              { "contact": "kebede@example.com", "contactType": "email" },
              { "contact": "+251911234567",      "contactType": "phone" }
            ]
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: access-control-allow-origin
          value: "*"
