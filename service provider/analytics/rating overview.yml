info:
  name: rating overview
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/dashboard/analytics/service-provider/rating"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{baseUrl}}/dashboard/analytics/service-provider/rating"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: access-control-allow-origin
          value: "*"
        - name: access-control-expose-headers
          value: Authorization, RefreshToken
        - name: content-type
          value: application/json; charset=utf-8
        - name: content-length
          value: "94"
        - name: etag
          value: W/"5e-JI8hpPjmss60kkvz22Ad+UHq9JU"
        - name: date
          value: Tue, 12 May 2026 11:10:40 GMT
        - name: connection
          value: keep-alive
        - name: keep-alive
          value: timeout=5
      body:
        type: json
        data: |-
          {
            "success": true,
            "message": "Rating retrieved successfully",
            "data": {
              "rating": 0,
              "ratingCount": 0
            }
          }
