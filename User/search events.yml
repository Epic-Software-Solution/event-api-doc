info:
  name: search events
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/events?q=music&limit=10"
  params:
    - name: q
      value: music
      type: query
    - name: limit
      value: "10"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
