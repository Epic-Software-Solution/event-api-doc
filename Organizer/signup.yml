info:
  name: signup
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/auth/organizer/signup"
  body:
    type: json
    data: |-
      {
        "organizationName": "Addis Events Com",
        "email": "organizer@addiseventss.com",
        "password": "Organizer1234!",
        "type": "company",
        "description": "Premier event organizer in Addis Ababa",
        "logo": "https://example.com/logo.png",
        "coverImage": "https://example.com/image.png"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
