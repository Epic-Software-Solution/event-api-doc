info:
  name: revenue overview
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/dashboard/analytics/overview/revenue "
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{baseUrl}}/dashboard/analytics/overview/revenue "
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: access-control-allow-origin
          value: "*"
        - name: access-control-expose-headers
          value: Authorization, RefreshToken
        - name: content-type
          value: application/json; charset=utf-8
        - name: content-length
          value: "120"
        - name: etag
          value: W/"78-PnnzaP/SkwEKAVFX0XW5hxbYFrg"
        - name: date
          value: Tue, 12 May 2026 09:24:31 GMT
        - name: connection
          value: keep-alive
        - name: keep-alive
          value: timeout=5
      body:
        type: json
        data: |-
          {
            "success": true,
            "message": "Platform revenue retrieved successfully",
            "data": {
              "totalRevenue": 15900,
              "totalTicketsSold": 24
            }
          }
