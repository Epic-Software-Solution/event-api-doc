info:
  name: verify otp
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/auth/otp/verify"
  body:
    type: json
    data: |2-
        {
        "email": "abebe@example.com",
        "otp": "551461",
        "channel": "email"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: example
    request:
      url: "{{baseUrl}}/auth/otp/verify"
      method: POST
      body:
        type: json
        data: |2-
            {
            "email": "abebe@example.com",
            "otp": "551461",
            "channel": "email"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: access-control-allow-origin
          value: "*"
        - name: access-control-expose-headers
          value: Authorization, RefreshToken
        - name: content-type
          value: application/json; charset=utf-8
        - name: content-length
          value: "78"
        - name: etag
          value: W/"4e-sxspdoUyaX0DXfS5iPk+n9dECXg"
        - name: date
          value: Sat, 02 May 2026 08:10:01 GMT
        - name: connection
          value: keep-alive
        - name: keep-alive
          value: timeout=5
      body:
        type: json
        data: |-
          {
            "success": true,
            "message": "OTP verified successfully",
            "data": {
              "isValid": true
            }
          }
